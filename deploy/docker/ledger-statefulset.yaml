apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ledger
  namespace: cks-system
  labels:
    app: gsai
    component: ledger
spec:
  serviceName: ledger
  replicas: 1
  selector:
    matchLabels:
      app: gsai
      component: ledger
  template:
    metadata:
      labels:
        app: gsai
        component: ledger
    spec:
      containers:
        - name: ledger
          image: gsai-runtime:latest
          command: ["python", "-m", "ledger.trace_ledger"]
          volumeMounts:
            - name: ledger-data
              mountPath: /data/ledger
  volumeClaimTemplates:
    - metadata:
        name: ledger-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ledger
  namespace: cks-system
  labels:
    app: gsai
    component: ledger
spec:
  selector:
    app: gsai
    component: ledger
  ports:
    - port: 7000
      name: ledger
  clusterIP: None
