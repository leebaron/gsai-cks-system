apiVersion: apps/v1
kind: Deployment
metadata:
  name: gsai-runtime
  namespace: cks-system
  labels:
    app: gsai
    component: runtime
spec:
  replicas: 3
  selector:
    matchLabels:
      app: gsai
      component: runtime
  template:
    metadata:
      labels:
        app: gsai
        component: runtime
    spec:
      containers:
        - name: runtime
          image: gsai-runtime:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: CKS_MODE
              value: "enforce"
            - name: CKS_LEDGER_HOST
              value: "ledger-0.ledger.cks-system"
            - name: CKS_GOVERNANCE
              value: "active"
          resources:
            requests:
              cpu: 500m
              memory: 256Mi
            limits:
              cpu: 2
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gsai-runtime
  namespace: cks-system
  labels:
    app: gsai
    component: runtime
spec:
  selector:
    app: gsai
    component: runtime
  ports:
    - port: 8080
      targetPort: 8080
      name: http
