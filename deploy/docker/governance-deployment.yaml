apiVersion: v1
kind: Namespace
metadata:
  name: cks-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: governance-controller
  namespace: cks-system
  labels:
    app: gsai
    component: governance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gsai
      component: governance
  template:
    metadata:
      labels:
        app: gsai
        component: governance
    spec:
      containers:
        - name: governance
          image: gsai-runtime:latest
          command: ["python", "-m", "governance.ccp"]
          env:
            - name: CKS_MODE
              value: "enforce"
