apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ledger
  namespace: {{ .Values.namespace }}
  labels:
    app: gsai
    component: ledger
spec:
  serviceName: ledger
  replicas: 1
  selector:
    matchLabels:
      app: gsai
      component: ledger
  template:
    metadata:
      labels:
        app: gsai
        component: ledger
    spec:
      containers:
        - name: ledger
          image: "{{ .Values.images.repository }}:{{ .Values.images.tag }}"
          command: ["python", "-m", "ledger.trace_ledger"]
          volumeMounts:
            - name: ledger-data
              mountPath: /data/ledger
  volumeClaimTemplates:
    - metadata:
        name: ledger-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.ledger.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: ledger
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: gsai
    component: ledger
  ports:
    - port: {{ .Values.ledger.port }}
      name: ledger
  clusterIP: None
