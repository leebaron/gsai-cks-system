{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gsai-ingress
  namespace: {{ .Values.namespace | default "cks-system" }}
  labels:
    app: gsai
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: {{ .Values.ingress.path }}
            pathType: Prefix
            backend:
              service:
                name: gsai-runtime
                port:
                  number: {{ .Values.runtime.port }}
{{- end }}
