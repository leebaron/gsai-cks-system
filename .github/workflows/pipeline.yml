name: CKS Production CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Full Pipeline Execution
        run: python ci/entrypoint.py && echo "PIPELINE: ALL GATES PASS" || (echo "PIPELINE: GATE FAIL"; exit 1)

  formal_proof:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Formal Model Verification
        run: python formal/checker.py && echo "FORMAL: ALL INVARIANTS PASS" || (echo "FORMAL: MODEL VIOLATION"; exit 1)

  security:
    needs: formal_proof
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          pip install pip-audit bandit
          pip install -r requirements.txt
      - name: Dependency audit
        run: pip-audit || echo "(warnings only)"
      - name: SAST scan
        run: bandit -q -r runtime roel consensus replay ledger --skip=B101

  build:
    needs: security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t cks-runtime:latest .
      - name: Log in to registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Push image
        run: |
          IMG_ID=ghcr.io/leebaron/ck-runtime:latest
          docker tag cks-runtime:latest $IMG_ID
          docker push $IMG_ID

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f charts/ck-system/ || echo "(K8s context not available in CI — deploy step requires configured cluster)"
