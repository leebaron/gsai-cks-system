apiVersion: apps/v1
kind: Deployment
metadata:
  name: ck-runtime
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: ck
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ck
    spec:
      containers:
        - name: runtime
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          env:
            - name: MODE
              value: "{{ .Values.runtime.mode }}"
            - name: COCS_STRICT_MODE
              value: "{{ .Values.runtime.strictCocs }}"
            - name: RAL_MODE
              value: "{{ .Values.runtime.ralMode }}"
          resources:
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 20
            periodSeconds: 15
