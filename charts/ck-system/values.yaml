replicaCount: 3

image:
  repository: ghcr.io/leebaron/ck-runtime
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  limits:
    cpu: "2"
    memory: "4Gi"
  requests:
    cpu: "500m"
    memory: "1Gi"

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70

runtime:
  mode: production
  strictCocs: true
  ralMode: strict
  ledgerPath: /data/ledger
